<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="850" viewBox="0 0 1280 850" role="img" aria-labelledby="title desc">
  <title id="title">The DKMS contract map for an NVIDIA Linux driver</title>
  <desc id="desc">A systems diagram showing vendor source entering DKMS, DKMS delegating builds to Kbuild, installed modules branching into the real root and initramfs, and the Linux loader handing accepted modules to NVIDIA firmware and user space.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L9 4.5L0 9Z" fill="#9bdc52"/>
    </marker>
    <marker id="muted-arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L9 4.5L0 9Z" fill="#778279"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#050706" flood-opacity="0.46"/>
    </filter>
    <style>
      .bg { fill: #0b0f0c; }
      .grid { stroke: #182019; stroke-width: 1; }
      .panel { fill: #111713; stroke: #2b352d; stroke-width: 1.5; }
      .panel-strong { fill: #151d17; stroke: #9bdc52; stroke-width: 2; }
      .panel-warn { fill: #1c1911; stroke: #bba75b; stroke-width: 1.5; }
      text { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .title { fill: #eef5ed; font-size: 30px; font-weight: 700; }
      .subtitle { fill: #9aa49b; font-size: 15px; font-weight: 400; }
      .eyebrow { fill: #9bdc52; font-size: 12px; font-weight: 700; letter-spacing: 1.6px; }
      .heading { fill: #eef5ed; font-size: 18px; font-weight: 700; }
      .body { fill: #c5cdc6; font-size: 13px; font-weight: 400; }
      .muted { fill: #8e9990; font-size: 12px; font-weight: 400; }
      .accent { fill: #9bdc52; font-size: 13px; font-weight: 700; }
      .warn { fill: #d4c47b; font-size: 12px; font-weight: 700; }
      .arrow { fill: none; stroke: #9bdc52; stroke-width: 2; marker-end: url(#arrow); }
      .arrow-muted { fill: none; stroke: #778279; stroke-width: 1.5; stroke-dasharray: 6 5; marker-end: url(#muted-arrow); }
      .divider { stroke: #2b352d; stroke-width: 1; stroke-dasharray: 5 5; }
      .chip { fill: #18211a; stroke: #354239; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="850" rx="18"/>
  <g opacity="0.55">
    <path class="grid" d="M0 50H1280M0 100H1280M0 150H1280M0 200H1280M0 250H1280M0 300H1280M0 350H1280M0 400H1280M0 450H1280M0 500H1280M0 550H1280M0 600H1280M0 650H1280M0 700H1280M0 750H1280M0 800H1280"/>
    <path class="grid" d="M50 0V850M100 0V850M150 0V850M200 0V850M250 0V850M300 0V850M350 0V850M400 0V850M450 0V850M500 0V850M550 0V850M600 0V850M650 0V850M700 0V850M750 0V850M800 0V850M850 0V850M900 0V850M950 0V850M1000 0V850M1050 0V850M1100 0V850M1150 0V850M1200 0V850M1250 0V850"/>
  </g>

  <text class="eyebrow" x="56" y="55">SYSTEMS MAP / NVIDIA OOT MODULES</text>
  <text class="title" x="56" y="94">Where DKMS owns state—and where it stops</text>
  <text class="subtitle" x="56" y="124">The same driver release crosses five independently enforced contracts.</text>

  <line class="divider" x1="286" y1="151" x2="286" y2="772"/>
  <line class="divider" x1="548" y1="151" x2="548" y2="772"/>
  <line class="divider" x1="836" y1="151" x2="836" y2="772"/>
  <line class="divider" x1="1097" y1="151" x2="1097" y2="772"/>

  <text class="eyebrow" x="56" y="174">PACKAGE</text>
  <text class="eyebrow" x="315" y="174">DKMS STATE</text>
  <text class="eyebrow" x="578" y="174">VENDOR + KBUILD</text>
  <text class="eyebrow" x="865" y="174">BOOT ARTIFACTS</text>
  <text class="eyebrow" x="1120" y="174">RUNTIME</text>

  <g filter="url(#shadow)">
    <rect class="panel" x="52" y="202" width="208" height="168" rx="10"/>
    <text class="heading" x="72" y="235">nvidia/&lt;D&gt;</text>
    <text class="body" x="72" y="265">/usr/src/nvidia-D</text>
    <text class="body" x="72" y="289">source + patches</text>
    <text class="body" x="72" y="313">dkms.conf + hooks</text>
    <rect class="chip" x="72" y="329" width="166" height="23" rx="11"/>
    <text class="muted" x="84" y="345">trusted package input</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="panel-strong" x="312" y="202" width="210" height="294" rx="10"/>
    <text class="heading" x="334" y="235">tuple identity</text>
    <text class="accent" x="334" y="262">(name, version,</text>
    <text class="accent" x="334" y="282"> kernel, arch)</text>
    <line x1="334" y1="302" x2="500" y2="302" stroke="#354239"/>
    <circle cx="344" cy="330" r="5" fill="#9bdc52"/>
    <text class="body" x="360" y="335">added</text>
    <path d="M344 339V372" stroke="#56705b" stroke-width="2"/>
    <circle cx="344" cy="382" r="5" fill="#9bdc52"/>
    <text class="body" x="360" y="387">built</text>
    <path d="M344 391V424" stroke="#56705b" stroke-width="2"/>
    <circle cx="344" cy="434" r="5" fill="#9bdc52"/>
    <text class="body" x="360" y="439">installed</text>
    <text class="muted" x="334" y="469">bookkeeping + lifecycle</text>
  </g>

  <path class="arrow" d="M260 286H300"/>
  <text class="muted" x="268" y="274">add</text>

  <g filter="url(#shadow)">
    <rect class="panel" x="574" y="202" width="236" height="294" rx="10"/>
    <text class="heading" x="596" y="235">materialize .ko</text>
    <text class="body" x="596" y="267">1  NVIDIA conftest</text>
    <text class="body" x="596" y="296">2  compile via Kbuild</text>
    <text class="body" x="596" y="325">3  MODPOST + symvers</text>
    <text class="body" x="596" y="354">4  final module link</text>
    <text class="body" x="596" y="383">5  strip / sign</text>
    <line x1="596" y1="407" x2="788" y2="407" stroke="#354239"/>
    <text class="muted" x="596" y="433">compiler and ABI facts</text>
    <text class="muted" x="596" y="455">come from target kernel</text>
    <text class="muted" x="596" y="477">build tree, not DKMS</text>
  </g>

  <path class="arrow" d="M522 350H562"/>
  <text class="muted" x="528" y="337">MAKE</text>
  <path class="arrow" d="M810 350H849"/>
  <text class="muted" x="814" y="337">install</text>

  <g filter="url(#shadow)">
    <rect class="panel" x="858" y="202" width="214" height="138" rx="10"/>
    <text class="heading" x="880" y="235">real root</text>
    <text class="body" x="880" y="265">/lib/modules/K/...</text>
    <text class="body" x="880" y="291">depmod indexes</text>
    <text class="muted" x="880" y="317">future late modprobe</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="panel-warn" x="858" y="380" width="214" height="164" rx="10"/>
    <text class="heading" x="880" y="413">initramfs snapshot</text>
    <text class="body" x="880" y="443">cpio: /lib/modules/K</text>
    <text class="body" x="880" y="469">its own depmod indexes</text>
    <text class="warn" x="880" y="498">may still contain D−1</text>
    <text class="muted" x="880" y="524">early KMS can win first</text>
  </g>

  <path class="arrow-muted" d="M965 340V368"/>
  <text class="muted" x="977" y="360">image generator</text>

  <g filter="url(#shadow)">
    <rect class="panel-strong" x="1118" y="202" width="116" height="342" rx="10"/>
    <text class="heading" x="1137" y="235">loader</text>
    <text class="body" x="1137" y="272">vermagic</text>
    <text class="body" x="1137" y="302">symbols</text>
    <text class="body" x="1137" y="332">modversions</text>
    <text class="body" x="1137" y="362">signature</text>
    <text class="body" x="1137" y="392">relocations</text>
    <text class="body" x="1137" y="422">policy</text>
    <line x1="1137" y1="450" x2="1215" y2="450" stroke="#56705b"/>
    <text class="accent" x="1137" y="477">accept</text>
    <text class="muted" x="1137" y="500">or reject</text>
    <text class="muted" x="1137" y="522">the bytes</text>
  </g>

  <path class="arrow" d="M1072 270H1106"/>
  <path class="arrow" d="M1072 462H1106"/>

  <g filter="url(#shadow)">
    <rect class="panel" x="312" y="584" width="922" height="156" rx="10"/>
    <text class="eyebrow" x="334" y="615">AFTER LOADER ACCEPTANCE</text>
    <text class="heading" x="334" y="650">resident NVIDIA module graph</text>
    <rect class="chip" x="334" y="674" width="112" height="31" rx="7"/>
    <text class="body" x="350" y="695">nvidia</text>
    <rect class="chip" x="463" y="674" width="146" height="31" rx="7"/>
    <text class="body" x="479" y="695">nvidia_modeset</text>
    <rect class="chip" x="626" y="674" width="123" height="31" rx="7"/>
    <text class="body" x="642" y="695">nvidia_drm</text>
    <rect class="chip" x="766" y="674" width="123" height="31" rx="7"/>
    <text class="body" x="782" y="695">nvidia_uvm</text>
    <path class="arrow" d="M902 689H948"/>
    <text class="body" x="963" y="685">GSP / firmware</text>
    <text class="body" x="963" y="708">user-space stack</text>
  </g>

  <path class="arrow" d="M1176 544V572"/>

  <text class="muted" x="56" y="794">DKMS can report “installed” before initramfs, loader trust, firmware, or user-space compatibility is proven.</text>
  <text class="accent" x="56" y="818">Debug the first broken transition—not the final symptom.</text>
</svg>
